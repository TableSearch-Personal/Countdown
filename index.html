<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0b0b;
color:#e6e6e6;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

body,button{
-webkit-user-select:none;
user-select:none;
}

/* progress bar */

.progressContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:5px;
background:#222;
z-index:10;
}

.progressBar{
height:100%;
width:0%;
background:#e63946;
}

/* potato */

.potatoAlert{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:#161616;
border:1px solid #444;
padding:10px 18px;
font-size:22px;
border-radius:6px;
display:none;
z-index:20;
cursor:pointer;
}

/* log */

.log{
position:fixed;
top:70px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
height:160px;
overflow-y:auto;
background:#111;
border:1px solid #333;
padding:10px;
font-size:12px;
}

.logTitle{
color:#777;
font-size:11px;
letter-spacing:1px;
margin-bottom:6px;
}

.extra{
color:#d08a3c;
}

.daily{
color:#ddd;
}

.reached{
color:#4caf50;
font-weight:bold;
}

/* countdown */

.container{
text-align:center;
padding-top:40px;
}

.weeks{
font-size:22px;
color:#888;
letter-spacing:3px;
margin-bottom:10px;
}

.days{
font-size:120px;
font-weight:900;
}

.label{
font-size:16px;
color:#777;
margin-top:-10px;
}

.time{
margin-top:15px;
font-size:18px;
color:#aaa;
}

/* button */

.plus{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:70px;
height:70px;
border-radius:50%;
background:#111;
border:2px solid #444;
color:white;
font-size:36px;
cursor:pointer;
z-index:5;
}

/* counters */

.counter{
position:fixed;
bottom:20px;
right:20px;
text-align:right;
font-size:14px;
color:#aaa;
}

.counter span{
font-size:22px;
color:white;
}

</style>
</head>

<body>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<div id="potatoAlert" class="potatoAlert">🥔</div>

<div class="log">
<div class="logTitle">CLICK LOG</div>
<div id="logContent">No clicks yet.</div>
</div>

<div class="container">

<div class="weeks" id="weeks"></div>
<div class="days" id="days"></div>
<div class="label">DAYS REMAINING</div>
<div class="time" id="time"></div>

</div>

<button class="plus" id="plus">+</button>

<div class="counter">
Daily Counter<br>
<span id="dailyCounter">0</span><br><br>
Extra Clicks Today<br>
<span id="extraClicks">0</span>
</div>

<script>

/* determine next June 30 */

function getTargetDate(){

const now = new Date();
let year = 2028;

while(new Date(year,5,30) <= now){
year++;
}

return new Date(year,5,30);

}

/* reached milestones */

function getReachedDates(){

const now = new Date();
let year = 2028;
let reached = [];

while(new Date(year,5,30) <= now){

let d = new Date(year,5,30);

reached.push(
d.toLocaleDateString(undefined,{day:"2-digit",month:"long",year:"numeric"})
);

year++;

}

return reached;

}

/* countdown */

function updateCountdown(){

const target = getTargetDate();
const now = new Date();

let diff = target - now;

if(diff < 0) diff = 0;

const days = Math.floor(diff/(1000*60*60*24));
const weeks = Math.floor(days/7);

const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);
const seconds = Math.floor((diff/1000)%60);

document.getElementById("days").textContent = Math.max(0,days);
document.getElementById("weeks").textContent = weeks+" WEEKS";
document.getElementById("time").textContent =
hours+"h "+minutes+"m "+seconds+"s";

}

setInterval(updateCountdown,1000);
updateCountdown();

/* storage */

let dailyCounter = parseInt(localStorage.getItem("dailyCounter")) || 0;
let extraClicks = parseInt(localStorage.getItem("extraClicks")) || 0;
let lastMainClick = localStorage.getItem("lastMainClick") || "";
let logs = JSON.parse(localStorage.getItem("logs") || "[]");

/* cooldown */

let lastClickSecond = 0;

/* potato persistence */

const potatoAlert = document.getElementById("potatoAlert");

if(localStorage.getItem("potatoActive")==="true"){
potatoAlert.style.display="block";
}

function tryPotato(){

if(Math.floor(Math.random()*100)===0){
potatoAlert.style.display="block";
localStorage.setItem("potatoActive","true");
}

}

potatoAlert.onclick=()=>{
potatoAlert.style.display="none";
localStorage.removeItem("potatoActive");
};

/* render */

function render(){

document.getElementById("dailyCounter").textContent = dailyCounter;
document.getElementById("extraClicks").textContent = extraClicks;

const logBox = document.getElementById("logContent");

let reached = getReachedDates();

let reachedHTML = reached.map(d =>
`<div class="reached">✓ ${d} reached</div>`
).join("");

let clickHTML = logs.map(l =>
`<div class="${l.type}">${l.time} - ${l.label}</div>`
).join("");

if(!reachedHTML && !clickHTML){
logBox.innerHTML="No clicks yet.";
return;
}

logBox.innerHTML = reachedHTML + clickHTML;

logBox.scrollTop = logBox.scrollHeight;

}

render();

/* button logic */

const plus = document.getElementById("plus");

let holdStart=0;
let progressInterval;
let cleared=false;

function startHold(){

cleared=false;
holdStart=Date.now();

progressInterval=setInterval(()=>{

let elapsed=Date.now()-holdStart;
let percent=Math.min((elapsed/10000)*100,100);

document.getElementById("progressBar").style.width=percent+"%";

if(elapsed>=10000){

localStorage.clear();
location.reload();
cleared=true;

}

},100);

}

function cancelHold(){

clearInterval(progressInterval);
document.getElementById("progressBar").style.width="0%";

}

function release(){

cancelHold();
if(cleared) return;

const currentSecond=Math.floor(Date.now()/1000);

if(currentSecond===lastClickSecond) return;

lastClickSecond=currentSecond;

const today=new Date().toDateString();
const stamp=new Date().toLocaleString();

if(lastMainClick!==today){

dailyCounter++;
extraClicks=0;
lastMainClick=today;

logs.push({
time:stamp,
label:"DAILY CLICK",
type:"daily"
});

}
else{

extraClicks++;

logs.push({
time:stamp,
label:"EXTRA CLICK",
type:"extra"
});

}

localStorage.setItem("dailyCounter",dailyCounter);
localStorage.setItem("extraClicks",extraClicks);
localStorage.setItem("lastMainClick",lastMainClick);
localStorage.setItem("logs",JSON.stringify(logs));

render();

tryPotato();

}

plus.addEventListener("mousedown",startHold);
plus.addEventListener("touchstart",startHold);

plus.addEventListener("mouseup",release);
plus.addEventListener("touchend",release);

plus.addEventListener("mouseleave",cancelHold);

</script>

</body>
</html>
