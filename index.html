<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<div id="potatoAlert" class="potatoAlert">🥔</div>

<div class="logWrapper">

<button class="logToggle" id="toggleLog">Toggle Click Log</button>

<div class="log" id="log">
<div class="logTitle">CLICK LOG</div>
<div id="logContent">No clicks yet.</div>
</div>

</div>

<div class="container">

<div class="dateSmall" id="today"></div>

<div class="weeks" id="weeks"></div>
<div class="days" id="days"></div>
<div class="label">DAYS REMAINING</div>
<div class="time" id="time"></div>

</div>

<button class="plus" id="plus">+</button>

<div class="counter">
Daily Counter<br>
<span id="dailyCounter">0</span><br><br>
Extra Clicks Today<br>
<span id="extraClicks">0</span>
</div>

<script src="script.js"></script>

</body>
</html>
